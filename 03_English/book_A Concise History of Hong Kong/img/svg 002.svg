<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" height="293" viewBox="0 0 1090 293" xmlns:ev="http://www.w3.org/2001/xml-events" width="1090"><defs/><g transform="translate(5.5,5.5)" id="page1"><rect x="0" y="0" height="283" width="1080" fill="#ffffff"/><path fill-rule="nonzero" stroke="#3f5cb8" stroke-width="3" transform="translate(39.76,113.85)" d="M4.0,.0L61.0,.0C63.2,.0,65.0,1.8,65.0,4.0L65.0,52.0C65.0,54.2,63.2,56.0,61.0,56.0L4.0,56.0C1.8,56.0,.0,54.2,.0,52.0L.0,4.0C.0,1.8,1.8,.0,4.0,.0z" id="shape1" fill="#3f5cb8"/><g transform="translate(167.76,112.35)" id="shape2"><path fill-rule="nonzero" stroke="#eaebf1" d="M4.0,.0L238.0,.0C240.2,.0,242.0,1.8,242.0,4.0L242.0,55.0C242.0,57.2,240.2,59.0,238.0,59.0L4.0,59.0C1.8,59.0,.0,57.2,.0,55.0L.0,4.0C.0,1.8,1.8,.0,4.0,.0z" fill="#eaebf1"/><text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt"><tspan x="21.8" y="26.0">these women lived </tspan><tspan x="21.8" y="45.0">in a marginal area of Hong Kong</tspan></text></g><g transform="translate(434.76,39.50)" id="shape3"><path stroke="#696969" d="M.0,69.5L221.0,69.5" fill="none"/><text xml:space="preserve" style="fill:#454545;font-family:Microsoft YaHei;font-size:10.00pt"><tspan x="11.5" y="21.8">that was nestled </tspan><tspan x="11.5" y="40.8">between the European business </tspan><tspan x="11.5" y="59.8">and residential sections of town</tspan></text></g><g transform="translate(434.76,155.70)" id="shape4"><path stroke="#696969" d="M.0,50.5L138.0,50.5" fill="none"/><text xml:space="preserve" style="fill:#454545;font-family:Microsoft YaHei;font-size:10.00pt"><tspan x="11.5" y="21.8">and was inhabited </tspan><tspan x="11.5" y="40.8">by a mixed group</tspan></text></g><g transform="translate(597.76,117.70)" id="shape5"><path stroke="#696969" d="M.0,126.5L443.0,126.5" fill="none"/><text xml:space="preserve" style="fill:#454545;font-family:Microsoft YaHei;font-size:10.00pt"><tspan x="11.5" y="21.8">of European prostitutes, </tspan><tspan x="11.5" y="40.8">Indian merchants and shopkeepers,</tspan><tspan x="11.5" y="59.8">Portuguese,</tspan><tspan x="11.5" y="97.8">and Chinese prostitutes </tspan><tspan x="11.5" y="116.8">who serviced European and middle- and upper-class Chinese clients.</tspan></text></g><g transform="translate(120.01,141.85)" id="shape6"><path stroke="#696969" d="M-15.3,.0L11.3,.0L11.3,.0L47.8,.0" stroke-linecap="round" fill="none"/></g><g transform="translate(422.26,125.43)" id="shape7"><path stroke="#696969" d="M-12.5,16.4L-0.3,16.4C1.4,16.4,2.7,15.1,2.7,13.4L2.7,-13.4C2.7,-15.1,4.0,-16.4,5.7,-16.4L12.5,-16.4" stroke-linecap="round" fill="none"/></g><g transform="translate(422.26,174.03)" id="shape8"><path stroke="#696969" d="M-12.5,-32.2L-0.3,-32.2C1.4,-32.2,2.7,-30.8,2.7,-29.2L2.7,29.2C2.7,30.8,4.0,32.2,5.7,32.2L12.5,32.2" stroke-linecap="round" fill="none"/></g><g transform="translate(585.26,225.20)" id="shape9"><path stroke="#696969" d="M-12.5,-19.0L-0.3,-19.0C1.4,-19.0,2.7,-17.7,2.7,-16.0L2.7,16.0C2.7,17.7,4.0,19.0,5.7,19.0L12.5,19.0" stroke-linecap="round" fill="none"/></g></g></svg>