<svg height="852" viewBox="0 0 861 852" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="861">
    <defs/>
    <g transform="translate(-199.00,-56.00)">
        <g id="shape1" transform="translate(200.00,126.05)">
            <path fill="#e9f4ed" d="M222.0,115.0L222.0,.0L.0,.0L.0,115.0L222.0,115.0z" stroke="#323232" fill-rule="nonzero"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="67.5" y="34.5">1985年7月1日</tspan>
                <tspan x="46.0" y="72.5">成立”香港特別行政區</tspan>
                <tspan x="7.0" y="91.5">”基本法”起草委員會”（草委會）</tspan>
            </text>
        </g>
        <g id="shape2" transform="translate(639.50,161.50)">
            <path fill="#e9f4ed" d="M173.5,149.0L173.5,.0L.0,.0L.0,149.0L173.5,149.0z" stroke="#323232" fill-rule="nonzero"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="39.3" y="23.0">1985年9月18日</tspan>
                <tspan x="54.3" y="61.0">在香港成立</tspan>
                <tspan x="19.8" y="80.0"> “基本法諮詢委員會”</tspan>
                <tspan x="34.3" y="99.0">（諮委會, BLCC）</tspan>
                <tspan x="20.3" y="118.0">Hong Kong Basic Law </tspan>
                <tspan x="12.8" y="137.0">Consultative Committee</tspan>
            </text>
        </g>
        <g id="shape3" transform="translate(251.00,57.00)">
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="47.0" y="45.5">北京</tspan>
            </text>
        </g>
        <g id="shape4" transform="translate(666.25,76.00)">
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="47.0" y="45.5">香港</tspan>
            </text>
        </g>
        <g id="shape5" transform="translate(964.00,170.00)">
            <path fill="#ffffff" d="M95.0,132.0L95.0,.0L.0,.0L.0,132.0L95.0,132.0z" stroke="#323232" fill-rule="nonzero"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="21.5" y="71.5">香港市民</tspan>
            </text>
        </g>
        <g id="shape6" transform="translate(813.00,236.00)">
            <path fill="none" d="M.0,.0L145.0,.0" stroke="#191919" stroke-dasharray="6,4"/>
            <path fill="#191919" stroke-width="1" d="M145.0,-3.0L151.0,.0L145.0,3.0L145.0,-3.0" stroke="#191919" stroke-linecap="round"/>
            <rect fill="#ffffff" x="27.3" y="-28.5" height="19.0" width="98.0"/>
            <rect fill="#ffffff" x="40.3" y="-9.5" height="19.0" width="72.0"/>
            <rect fill="#ffffff" x="11.3" y="9.5" height="19.0" width="130.0"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="27.3" y="-13.5">就香港&lt;基本法></tspan>
                <tspan x="40.3" y="5.5">的各项草案, </tspan>
                <tspan x="11.3" y="24.5">征询香港市民的意见。</tspan>
            </text>
        </g>
        <g id="shape7" transform="translate(422.00,183.55)">
            <path fill="none" d="M.0,.0L211.5,.0" stroke="#191919" stroke-dasharray="6,4"/>
            <path fill="#191919" stroke-width="1" d="M211.5,-3.0L217.5,.0L211.5,3.0L211.5,-3.0" stroke="#191919" stroke-linecap="round"/>
            <rect fill="#ffffff" x="69.3" y="-28.5" height="19.0" width="78.0"/>
            <rect fill="#ffffff" x="62.8" y="-9.5" height="19.0" width="91.0"/>
            <rect fill="#ffffff" x="30.3" y="9.5" height="19.0" width="156.0"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="69.3" y="-13.5">一些人反对，</tspan>
                <tspan x="62.8" y="5.5">认为此举引入了</tspan>
                <tspan x="30.3" y="24.5">不必要的民主和公众参与。</tspan>
            </text>
        </g>
        <g id="shape8" transform="translate(368.28,241.05)">
            <path fill="none" d="M.0,.0L.0,38.8L265.2,38.8" stroke="#191919" stroke-dasharray="6,4"/>
            <path fill="#191919" stroke-width="1" d="M265.2,35.8L271.2,38.8L265.2,41.8L265.2,35.8" stroke="#191919" stroke-linecap="round"/>
            <rect fill="#ffffff" x="82.5" y="10.3" height="19.0" width="129.0"/>
            <rect fill="#ffffff" x="69.0" y="29.3" height="19.0" width="156.0"/>
            <rect fill="#ffffff" x="49.5" y="48.3" height="19.0" width="195.0"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="82.5" y="25.3">北京也能通过"咨委会"</tspan>
                <tspan x="69.0" y="44.3">了解香港哪些人值得信任、</tspan>
                <tspan x="49.5" y="63.3">哪些人可能成为未来的政治伙伴。</tspan>
            </text>
        </g>
        <g id="shape9" transform="translate(200.00,397.00)">
            <path fill="#ffede9" d="M222.0,85.0L222.0,.0L.0,.0L.0,85.0L222.0,85.0z" stroke="#323232" fill-rule="nonzero"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="58.5" y="38.5">1988年4月底公佈</tspan>
                <tspan x="23.0" y="57.5">&lt;基本法（草案）徵求意見稿></tspan>
            </text>
        </g>
        <g id="shape10" transform="translate(311.00,241.05)">
            <path fill="none" d="M.0,.0L.0,149.9" stroke="#191919"/>
            <path fill="#191919" stroke-width="1" d="M3.0,149.9L.0,155.9L-3.0,149.9L3.0,149.9" stroke="#191919" stroke-linecap="round"/>
        </g>
        <g id="shape11" transform="translate(200.00,481.50)">
            <path fill="#ffffff" d="M222.0,115.0L222.0,.0L.0,.0L.0,115.0L222.0,115.0z" stroke="#323232" fill-rule="nonzero"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="91.5" y="53.5">諮詢期</tspan>
                <tspan x="91.5" y="72.5">八個月</tspan>
            </text>
        </g>
        <g id="shape12" transform="translate(964.00,481.50)">
            <path fill="#ffffff" d="M95.0,132.0L95.0,.0L.0,.0L.0,132.0L95.0,132.0z" stroke="#323232" fill-rule="nonzero"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="21.5" y="71.5">香港市民</tspan>
            </text>
        </g>
        <g id="shape13" transform="translate(964.00,547.50)">
            <path fill="none" d="M.0,.0L-510.0,.0L-510.0,-8.5L-536.0,-8.5" stroke="#191919"/>
            <path fill="#191919" stroke-width="1" d="M-536.0,-5.5L-542.0,-8.5L-536.0,-11.5L-536.0,-5.5" stroke="#191919" stroke-linecap="round"/>
            <rect fill="#ffffff" x="-460.0" y="-19.0" height="19.0" width="111.0"/>
            <rect fill="#ffffff" x="-484.0" y="0.0" height="19.0" width="159.0"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="-460.0" y="-4.0">草案接到大量批評, </tspan>
                <tspan x="-484.0" y="15.0">指它沒有擴大”代議政制”.</tspan>
            </text>
        </g>
        <g id="shape14" transform="translate(200.00,651.00)">
            <path fill="#ffede9" d="M222.0,58.0L222.0,.0L.0,.0L.0,58.0L222.0,58.0z" stroke="#323232" fill-rule="nonzero"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="78.0" y="25.0">1990年2月</tspan>
                <tspan x="85.0" y="44.0">草案通過</tspan>
            </text>
        </g>
        <g id="shape15" transform="translate(311.00,596.50)">
            <path fill="none" d="M.0,.0L.0,48.5" stroke="#191919"/>
            <path fill="#191919" stroke-width="1" d="M3.0,48.5L.0,54.5L-3.0,48.5L3.0,48.5" stroke="#191919" stroke-linecap="round"/>
        </g>
        <g id="shape16" transform="translate(200.00,756.00)">
            <path fill="#ffede9" d="M222.0,151.0L222.0,.0L.0,.0L.0,151.0L222.0,151.0z" stroke="#323232" fill-rule="nonzero"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan x="67.5" y="24.0">1990年4月4日</tspan>
                <tspan x="64.0" y="43.0">《基本法》通过.</tspan>
                <tspan x="33.0" y="62.0">《基本法》是香港的小憲法</tspan>
                <tspan x="10.0" y="100.0">全國人大常委會, 擁有《基本法》的</tspan>
                <tspan x="10.0" y="119.0">最終解釋權和修改權, 並有權廢除任</tspan>
                <tspan x="5.5" y="138.0">何它認為牴觸《基本法》的香港法律.</tspan>
            </text>
        </g>
        <g id="shape17" transform="translate(311.00,709.00)">
            <path fill="none" d="M.0,.0L.0,41.0" stroke="#191919"/>
            <path fill="#191919" stroke-width="1" d="M3.0,41.0L.0,47.0L-3.0,41.0L3.0,41.0" stroke="#191919" stroke-linecap="round"/>
        </g>
    </g>
