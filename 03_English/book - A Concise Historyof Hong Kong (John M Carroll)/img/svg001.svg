<svg width="1106" xmlns:xlink="http://www.w3.org/1999/xlink" height="919" viewBox="0 0 1106 919" xmlns="http://www.w3.org/2000/svg">
    <defs/>
    <g transform="translate(-84.91,-685.00)">
        <g id="shape1" transform="translate(454.00,925.70)">
            <path stroke="#323232" fill-rule="nonzero" fill="#ffffff" d="M472.0,114.0L472.0,.0L.0,.0L.0,114.0L472.0,114.0z"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:14.00pt;font-weight:bold">
                <tspan y="24.0" x="169.5">Governor 港督</tspan>
                <tspan y="45.0" x="185.0" style="font-size:11.00pt">(身兼以下職務)</tspan>
            </text>
        </g>
        <g id="table2" transform="translate(85.41,925.70)">
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,.0L254.6,.0L254.6,65.0L.0,65.0L.0,.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="19.0" x="4.0" style="font-size:11.00pt;font-weight:bold">Executive Council, ExCo </tspan>
                    <tspan y="38.0" x="4.0">行政局 (</tspan>
                    <tspan x="51.0" style="fill:#c00000">諮詢機構, 無實際"行政權"</tspan>
                    <tspan x="200.0">)</tspan>
                </text>
            </g>
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,65.0L254.6,65.0L254.6,225.0L.0,225.0L.0,65.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="84.0" x="4.0">職能:</tspan>
                    <tspan y="103.0" x="4.0" style="fill:#c00000">沒有獨立權力, </tspan>
                    <tspan y="122.0" x="4.0" style="fill:#c00000">只是港督的最高諮詢機構，</tspan>
                    <tspan y="141.0" x="4.0">類似尚書, 秘書, 內閣</tspan>
                    <tspan y="179.0" x="4.0">- 協助港督制定政策、處理重大行政事務；</tspan>
                    <tspan y="198.0" x="4.0">- 沒有獨立投票權，僅作諮詢。</tspan>
                </text>
            </g>
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,225.0L254.6,225.0L254.6,290.0L.0,290.0L.0,225.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="244.0" x="4.0">成員:</tspan>
                    <tspan y="263.0" x="4.0">- 官守議員 (高級官員)</tspan>
                    <tspan y="282.0" x="4.0">- 非官守議員（通常是商界代表）</tspan>
                </text>
            </g>
        </g>
        <g id="table3" transform="translate(643.00,1187.50)">
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,.0L255.8,.0L255.8,65.0L.0,65.0L.0,.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="19.0" x="4.0" style="font-size:11.00pt;font-weight:bold">Legislative Council, LegCo</tspan>
                    <tspan y="38.0" x="4.0">立法局 (立法機構)</tspan>
                </text>
            </g>
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,65.0L255.8,65.0L255.8,149.0L.0,149.0L.0,65.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="84.0" x="4.0">職能:</tspan>
                    <tspan y="103.0" x="4.0" style="fill:#c00000">立法機構，但實權極小.</tspan>
                    <tspan x="137.0"></tspan>
                    <tspan y="122.0" x="4.0">- 主要職能是: </tspan>
                    <tspan x="86.0" style="fill:#c00000">批准”預算”與”法案”</tspan>
                    <tspan x="229.0">。</tspan>
                </text>
            </g>
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,149.0L255.8,149.0L255.8,328.0L.0,328.0L.0,149.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="168.0" x="4.0">成員:</tspan>
                    <tspan y="187.0" x="4.0">- 官守議員（Official Members）：殖民地</tspan>
                    <tspan y="206.0" x="4.0">政府高官（如律政司、財政司等）</tspan>
                    <tspan y="225.0" x="4.0">- 非官守議員（Unofficial Members）：由</tspan>
                    <tspan y="244.0" x="4.0">總督委任的民間人士（多為商界代表，歐籍</tspan>
                    <tspan y="263.0" x="4.0">居多，後期才出現華人）。</tspan>
                    <tspan y="282.0" x="4.0"></tspan>
                    <tspan y="301.0" x="4.0" style="fill:#c00000">沒有選舉制度，沒有"民意代表性"。</tspan>
                </text>
            </g>
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,328.0L255.8,328.0L255.8,415.7L.0,415.7L.0,328.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="347.0" x="4.0">立法程序：</tspan>
                    <tspan y="366.0" x="4.0">- 所有法案必須經"港督"批准；</tspan>
                    <tspan y="385.0" x="4.0">- </tspan>
                    <tspan x="14.0" style="fill:#c00000">港督有否決權。</tspan>
                </text>
            </g>
        </g>
        <g id="table4" transform="translate(934.26,1187.50)">
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,.0L255.8,.0L255.8,160.0L.0,160.0L.0,.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="19.0" x="4.0" style="font-size:11.00pt;font-weight:bold">Judiciary</tspan>
                    <tspan y="38.0" x="4.0">司法機構</tspan>
                    <tspan y="57.0" x="4.0"></tspan>
                    <tspan y="76.0" x="4.0">機構結構：</tspan>
                    <tspan y="95.0" x="4.0">- 最高法院（Supreme Court）</tspan>
                    <tspan y="114.0" x="4.0">- 地方法院（District Court）</tspan>
                    <tspan y="133.0" x="4.0">- 裁判法院（Magistrates’ Court）</tspan>
                </text>
            </g>
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,160.0L255.8,160.0L255.8,320.0L.0,320.0L.0,160.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="179.0" x="4.0">性質：</tspan>
                    <tspan y="198.0" x="4.0">- 理論上獨立，但</tspan>
                    <tspan x="105.0" style="fill:#c00000">實際上受”行政”影響。</tspan>
                    <tspan x="248.0"></tspan>
                    <tspan y="217.0" x="4.0">- </tspan>
                    <tspan x="14.0" style="fill:#c00000">法官由港督任命，但通常來自"英國本土</tspan>
                    <tspan y="236.0" x="4.0" style="fill:#c00000">法官團體"。</tspan>
                    <tspan y="255.0" x="4.0">- 採用英國普通法（Common Law）制</tspan>
                    <tspan y="274.0" x="4.0">度，但由於”行政主導”，實際上獨立性有</tspan>
                    <tspan y="293.0" x="4.0">限。</tspan>
                </text>
            </g>
        </g>
        <g id="shape5" transform="translate(472.00,977.70)">
            <path stroke="#323232" fill-rule="nonzero" fill="#ffffff" d="M95.0,43.0L95.0,.0L.0,.0L.0,43.0L95.0,43.0z"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan y="19.0" x="4.0">行政首腦</tspan>
                <tspan y="38.0" x="4.0">（政府首長）</tspan>
            </text>
        </g>
        <g id="shape6" transform="translate(586.50,977.70)">
            <path stroke="#323232" fill-rule="nonzero" fill="#ffffff" d="M95.0,43.0L95.0,.0L.0,.0L.0,43.0L95.0,43.0z"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan y="19.0" x="4.0">立法局主席</tspan>
            </text>
        </g>
        <g id="shape7" transform="translate(699.00,977.70)">
            <path stroke="#323232" fill-rule="nonzero" fill="#ffffff" d="M95.0,43.0L95.0,.0L.0,.0L.0,43.0L95.0,43.0z"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan y="19.0" x="4.0">司法任命權</tspan>
                <tspan y="38.0" x="4.0">掌握者</tspan>
            </text>
        </g>
        <g id="shape8" transform="translate(813.00,977.70)">
            <path stroke="#323232" fill-rule="nonzero" fill="#ffffff" d="M95.0,43.0L95.0,.0L.0,.0L.0,43.0L95.0,43.0z"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan y="19.0" x="4.0">軍隊統帥</tspan>
            </text>
        </g>
        <g id="shape9" transform="translate(934.26,925.70)">
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan y="19.0" x="4.4">所以</tspan>
                <tspan x="30.4" style="fill:#c00000">三權最終都集中</tspan>
                <tspan y="38.0" x="4.4" style="fill:#c00000">於"港督"手中，</tspan>
                <tspan x="94.4">只是名義</tspan>
                <tspan y="57.0" x="4.4">上分設不同機構。</tspan>
            </text>
        </g>
        <g id="shape10" transform="translate(637.23,1020.70)">
            <path stroke="#191919" fill="none" d="M.0,.0L.0,78.4L80.8,78.4L80.8,154.3"/>
            <path stroke="#191919" stroke-linecap="round" stroke-width="1" fill="#191919" d="M83.8,154.3L80.8,160.3L77.8,154.3L83.8,154.3"/>
        </g>
        <g id="shape11" transform="translate(746.50,1020.70)">
            <path stroke="#191919" fill="none" d="M.0,.0L.0,61.0L311.5,61.0L311.5,154.3"/>
            <path stroke="#191919" stroke-linecap="round" stroke-width="1" fill="#191919" d="M314.5,154.3L311.5,160.3L308.5,154.3L314.5,154.3"/>
        </g>
        <g id="shape12" transform="translate(454.00,776.70)">
            <path stroke="#323232" fill-rule="nonzero" fill="#ffffff" d="M227.5,73.3L227.5,.0L.0,.0L.0,73.3L227.5,73.3z"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:11.00pt;font-weight:bold">
                <tspan y="19.0" x="26.7">Colonial Office 殖民地部</tspan>
                <tspan y="38.0" x="15.7" style="font-size:10.00pt;font-weight:normal">首長：Secretary of State for the </tspan>
                <tspan y="57.0" x="53.2" style="font-size:10.00pt;font-weight:normal">Colonies 殖民地大臣</tspan>
            </text>
        </g>
        <g id="shape13" transform="translate(454.00,686.00)">
            <path stroke="#323232" fill-rule="nonzero" fill="#ffffff" d="M227.5,38.3L227.5,.0L.0,.0L.0,38.3L227.5,38.3z"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:11.00pt;font-weight:bold">
                <tspan y="19.0" x="65.3">英國政府/內閣</tspan>
            </text>
        </g>
        <g id="shape14" transform="translate(567.75,724.30)">
            <path stroke="#191919" fill="none" d="M.0,.0L.0,46.4"/>
            <path stroke="#191919" stroke-linecap="round" stroke-width="1" fill="#191919" d="M3.0,46.4L.0,52.4L-3.0,46.4L3.0,46.4"/>
        </g>
        <g id="shape15" transform="translate(567.75,850.00)">
            <path stroke="#191919" fill="none" d="M.0,.0L.0,43.7L122.2,43.7L122.2,69.7"/>
            <path stroke="#191919" stroke-linecap="round" stroke-width="1" fill="#191919" d="M125.2,69.7L122.2,75.7L119.2,69.7L125.2,69.7"/>
            <rect width="52.0" y="34.2" fill="#ffffff" height="19.0" x="37.5"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan y="49.2" x="37.5">實際任命</tspan>
            </text>
        </g>
        <g id="shape16" transform="translate(698.50,686.00)">
            <path stroke="#323232" fill-rule="nonzero" fill="#ffffff" d="M227.5,38.3L227.5,.0L.0,.0L.0,38.3L227.5,38.3z"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:11.00pt;font-weight:bold">
                <tspan y="19.0" x="83.8">英國君主</tspan>
            </text>
        </g>
        <g id="shape17" transform="translate(812.25,724.30)">
            <path stroke="#191919" stroke-dasharray="6,4" fill="none" d="M.0,.0L.0,169.4L-102.9,169.4L-102.9,195.4"/>
            <path stroke="#191919" stroke-linecap="round" stroke-width="1" fill="#191919" d="M-99.9,195.4L-102.9,201.4L-105.9,195.4L-99.9,195.4"/>
            <rect width="65.0" y="159.9" fill="#ffffff" height="19.0" x="-80.5"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan y="174.9" x="-80.5">象徵性任命</tspan>
            </text>
        </g>
        <g id="shape18" transform="translate(519.50,1020.70)">
            <path stroke="#191919" fill="none" d="M.0,.0L.0,154.3"/>
            <path stroke="#191919" stroke-linecap="round" stroke-width="1" fill="#191919" d="M3.0,154.3L.0,160.3L-3.0,154.3L3.0,154.3"/>
        </g>
        <g id="table19" transform="translate(359.00,1187.50)">
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,.0L254.6,.0L254.6,65.0L.0,65.0L.0,.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="19.0" x="4.0" style="font-size:11.00pt;font-weight:bold">Government Departments</tspan>
                    <tspan y="38.0" x="4.0">政府各部門（行政執行）</tspan>
                </text>
            </g>
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,65.0L254.6,65.0L254.6,130.0L.0,130.0L.0,65.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="84.0" x="4.0">職能:</tspan>
                    <tspan y="103.0" x="4.0" style="fill:#c00000">是具體執行機構, 有實際"行政權"</tspan>
                </text>
            </g>
            <g>
                <path stroke="#5f497a" fill="#ffffff" d="M.0,130.0L254.6,130.0L254.6,309.0L.0,309.0L.0,130.0z"/>
                <text xml:space="preserve" style="fill:#303030;font-family:Microsoft YaHei;font-size:10.00pt">
                    <tspan y="149.0" x="4.0">各司、署、廳（例如：財政司、律政司、警</tspan>
                    <tspan y="168.0" x="4.0">察廳等）</tspan>
                    <tspan y="206.0" x="4.0">- 律政司 Attorney General（法律事務、</tspan>
                    <tspan y="225.0" x="4.0">檢控）</tspan>
                    <tspan y="244.0" x="4.0">- 財政司 Colonial Treasurer（財政預算）</tspan>
                    <tspan y="263.0" x="4.0">- 華民政務司 Secretary for Chinese </tspan>
                    <tspan y="282.0" x="4.0">Affairs（華人事務）</tspan>
                    <tspan y="301.0" x="4.0">- 警察廳 Police Force（治安維持）</tspan>
                </text>
            </g>
        </g>
        <g id="shape20" transform="translate(340.00,945.00)">
            <path stroke="#191919" fill="none" d="M.0,.0L259.0,.0"/>
            <path stroke="#191919" stroke-linecap="round" stroke-width="1" fill="#191919" d="M259.0,-3.0L265.0,.0L259.0,3.0L259.0,-3.0"/>
            <rect width="26.0" y="-9.5" fill="#ffffff" height="19.0" x="42.0"/>
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:10.00pt">
                <tspan y="5.5" x="42.0">參謀</tspan>
            </text>
        </g>
        <g id="shape21" transform="translate(152.71,888.00)">
            <text xml:space="preserve" style="fill:#191919;font-family:Microsoft YaHei;font-size:14.00pt;font-weight:bold">
                <tspan y="26.0" x="41.0">參謀</tspan>
            </text>
        </g>
    </g>
</svg>
