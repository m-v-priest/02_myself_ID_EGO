<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式历史时间轴</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            /* 💡 关键！增加 body 顶部填充，以适应两排按钮的高度 */
            padding-top: 180px;
        }

        #fixed-controls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #f8f8f8;
            border-bottom: 1px solid #ccc;
            padding: 10px 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        /* 💡 关键修改：设置行样式 */
        .controls-row {
            display: flex; /* 使用 Flexbox 布局，使元素在一行内对齐 */
            gap: 20px;     /* 元素之间的间距 */
            align-items: center; /* 垂直居中对齐 */
            margin-bottom: 10px; /* 每行之间的垂直间距 */
        }

        /* 移除最后一行的底部间距 */
        #controls-row-2 {
            margin-bottom: 0;
        }

        .controls-row button {
            padding: 8px 12px;
            cursor: pointer;
        }

        h1 {
            padding: 0 20px;
            margin-top: 20px;
        }

        #timeline-container {
            border: 1px solid #ccc;
            width: 90%;
            margin: 20px auto;
        }
    </style>
</head>
<body>

<h1>交互式历史时间轴</h1>

<div id="fixed-controls">

    <div id="controls-row-1" class="controls-row">
        <button id="zoom-in">🔍 放大时间轴</button>
        <button id="zoom-out">🔍 缩小时间轴</button>

        <label for="font-size">文字大小:</label>
        <input type="number" id="font-size" value="12" min="8" max="30">

        <label for="dot-size">圆点大小:</label>
        <input type="number" id="dot-size" value="4" min="2" max="10">
    </div>

    <div id="controls-row-2" class="controls-row">
        <label for="min-year">起始年份 (100年间隔):</label>
        <input type="number" id="min-year" value="-300" step="100">

        <label for="max-year">最大年份 (100年间隔):</label>
        <input type="number" id="max-year" value="1000" step="100">
        <button id="update-timeline">更新时间轴范围</button>
    </div>

</div>
<div id="timeline-container">
    <svg id="timeline-svg" width="100%" height="100%"></svg>
</div>

<script src="timeline.js"></script>

</body>
</html>
