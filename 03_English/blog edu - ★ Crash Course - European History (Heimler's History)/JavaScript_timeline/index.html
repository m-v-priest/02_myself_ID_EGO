<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式历史时间轴</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
    <h1>交互式历史时间轴</h1>
</div>

<div class="controls-panel">
    <div class="controls-row-1">
        <button id="zoom-in">放大时间轴</button>
        <button id="zoom-out">缩小时间轴</button>

        <label for="font-size">文字大小:</label>
        <input type="number" id="font-size" value="12" min="8" max="30">

        <label for="dot-size">圆点大小:</label>
        <input type="number" id="dot-size" value="4" min="1" max="20">


    </div>

    <div class="controls-row-2">
        <label for="min-year">起始年份 (100年间隔):</label>
        <input type="number" id="min-year" value="-300" step="100">

        <label for="max-year">最大年份 (100年间隔):</label>
        <input type="number" id="max-year" value="1000" step="100">

        <button id="update-timeline">更新时间轴范围</button>
    </div>

    <div class="controls-row-3">
        <label for="modern-zoom">
            近代放大倍数 (n)
        </label>
        <input type="number" id="modern-zoom" value="2.0" step="0.1" min="1.0">
    </div>
</div>


<div id="timeline-container">
    <svg id="timeline-svg"></svg>
</div>

<script src="timeline.js"></script>
</body>
</html>
